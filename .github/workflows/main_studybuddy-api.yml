name: Build and deploy Python app to Azure Web App - studybuddy-api
on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Create and Start virtual environment and Install dependencies
        working-directory: ./Backend
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
                
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            ./Backend
            !./Backend/antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_64EBB8A9DC124AD18EE55354BDC66150 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_14119D8D56A24C7DB660D050C5B9AB5A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_93EB3EFD66B946D4926DE5515DA6CF9C }}
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'studybuddy-api'
          slot-name: 'Production'
          package: './Backend'
